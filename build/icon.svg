<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#0d1b2e"/>
    </linearGradient>
    <linearGradient id="rocketGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2fe"/>
      <stop offset="100%" style="stop-color:#7dd3fc"/>
    </linearGradient>
    <linearGradient id="flameGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="50%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <linearGradient id="bucketGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glowOrange" cx="50%" cy="70%" r="40%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="512" x2="1024" y2="512" stroke="#1e3a5f" stroke-width="1.5" opacity="0.4"/>
  <line x1="512" y1="0" x2="512" y2="1024" stroke="#1e3a5f" stroke-width="1.5" opacity="0.4"/>
  <circle cx="512" cy="512" r="380" fill="none" stroke="#1e3a5f" stroke-width="1.5" opacity="0.4"/>
  <circle cx="512" cy="512" r="240" fill="none" stroke="#1e3a5f" stroke-width="1.5" opacity="0.3"/>

  <!-- Stars -->
  <circle cx="180" cy="160" r="4" fill="#e0f2fe" opacity="0.9"/>
  <circle cx="840" cy="200" r="3" fill="#bae6fd" opacity="0.8"/>
  <circle cx="750" cy="130" r="5" fill="#e0f2fe" opacity="0.7"/>
  <circle cx="220" cy="300" r="2.5" fill="#7dd3fc" opacity="0.9"/>
  <circle cx="880" cy="350" r="3.5" fill="#e0f2fe" opacity="0.6"/>
  <circle cx="130" cy="450" r="3" fill="#bae6fd" opacity="0.7"/>
  <circle cx="900" cy="480" r="2.5" fill="#e0f2fe" opacity="0.8"/>
  <circle cx="160" cy="600" r="4" fill="#7dd3fc" opacity="0.6"/>
  <circle cx="310" cy="170" r="2" fill="#e0f2fe" opacity="0.9"/>
  <circle cx="680" cy="150" r="3" fill="#bae6fd" opacity="0.7"/>

  <!-- Glow halos -->
  <ellipse cx="512" cy="540" rx="260" ry="260" fill="url(#glowBlue)" opacity="0.6"/>
  <ellipse cx="512" cy="700" rx="160" ry="120" fill="url(#glowOrange)" opacity="0.7"/>

  <!-- Rocket flame outer (wide, faint) -->
  <path d="M440 740 Q512 860 584 740 Q556 800 512 830 Q468 800 440 740 Z"
        fill="#7c3aed" opacity="0.5" filter="url(#glow)"/>

  <!-- Rocket flame middle -->
  <path d="M460 735 Q512 840 564 735 Q548 785 512 810 Q476 785 460 735 Z"
        fill="url(#flameGrad)" opacity="0.9" filter="url(#softGlow)"/>

  <!-- Rocket flame inner (bright core) -->
  <path d="M490 730 Q512 790 534 730 Q526 760 512 775 Q498 760 490 730 Z"
        fill="#fef3c7" opacity="0.95"/>

  <!-- Rocket body -->
  <path d="M440 680
           L440 440
           Q440 300 512 220
           Q584 300 584 440
           L584 680
           Z"
        fill="url(#rocketGrad)" filter="url(#softGlow)"/>

  <!-- Rocket nose cone highlight -->
  <path d="M480 320 Q512 230 512 230 Q490 280 480 320 Z"
        fill="white" opacity="0.6"/>

  <!-- Rocket window -->
  <circle cx="512" cy="480" r="52" fill="#0a0e1a" stroke="#38bdf8" stroke-width="8"/>
  <circle cx="512" cy="480" r="40" fill="#0f2744"/>
  <circle cx="512" cy="480" r="40" fill="none" stroke="#7dd3fc" stroke-width="3" opacity="0.6"/>
  <!-- Window shine -->
  <ellipse cx="502" cy="468" rx="14" ry="10" fill="#e0f2fe" opacity="0.35" transform="rotate(-20 502 468)"/>

  <!-- Left fin -->
  <path d="M440 640 L380 720 L380 680 L440 600 Z"
        fill="#0ea5e9" opacity="0.9"/>
  <!-- Left fin shading -->
  <path d="M440 640 L380 720 L380 700 L440 630 Z"
        fill="#0284c7" opacity="0.5"/>

  <!-- Right fin -->
  <path d="M584 640 L644 720 L644 680 L584 600 Z"
        fill="#0ea5e9" opacity="0.9"/>
  <!-- Right fin shading -->
  <path d="M584 640 L644 720 L644 700 L584 630 Z"
        fill="#0284c7" opacity="0.5"/>

  <!-- Cloud (S3 bucket metaphor) underneath -->
  <g opacity="0.92" filter="url(#softGlow)">
    <!-- Cloud main body -->
    <rect x="280" y="780" width="464" height="110" rx="20" fill="url(#bucketGrad)"/>
    <!-- Cloud bumps -->
    <circle cx="360" cy="780" r="58" fill="#1e40af"/>
    <circle cx="460" cy="758" r="72" fill="#1d4ed8"/>
    <circle cx="570" cy="762" r="66" fill="#1d4ed8"/>
    <circle cx="666" cy="778" r="54" fill="#1e40af"/>
    <!-- Cloud fill bottom -->
    <rect x="290" y="778" width="444" height="60" fill="url(#bucketGrad)"/>
    <!-- Cloud top gloss line -->
    <path d="M340 780 Q460 740 580 750 Q640 758 680 778"
          fill="none" stroke="#38bdf8" stroke-width="4" opacity="0.5" stroke-linecap="round"/>
  </g>

  <!-- Cloud label accent dots -->
  <circle cx="440" cy="833" r="6" fill="#38bdf8" opacity="0.8"/>
  <circle cx="512" cy="833" r="6" fill="#38bdf8" opacity="0.8"/>
  <circle cx="584" cy="833" r="6" fill="#38bdf8" opacity="0.8"/>

  <!-- Outer ring accent -->
  <circle cx="512" cy="512" r="472" fill="none" stroke="#1e3a5f" stroke-width="3" opacity="0.6"/>
</svg>
